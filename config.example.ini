[paths]
# Portable starter config. For old ChatMain behavior, copy config.legacy.example.ini instead.
# Main archive folder. Change this to rename or move the whole archive.
archive_root = ./archive
# Leave blank to put index.csv inside archive_root.
index_path =
# Folder where filter_chat.py writes filtered markdown.
filter_output_dir = ./filtered
# Leave source-specific outputs blank so they inherit from archive_root.
search_output =
vscode_output =
cursor_output =
claude_output =
codex_output =

[sources]
# Source folders/databases that the exporter reads from.
vscode_workspace_storage = %APPDATA%/Code/User/workspaceStorage
cursor_workspace_storage = %APPDATA%/Cursor/User/workspaceStorage
cursor_db = %APPDATA%/Cursor/User/globalStorage/state.vscdb
claude_projects = %USER%/.claude/projects
claude_plans = %USER%/.claude/plans
claude_plan_mirror =
codex_sessions = %USER%/.codex/sessions
copilot_cli_state = %USER%/.copilot/session-state
# Optional extra markdown plan folders. Used only when exporting plans/all.
# Separate multiple folders with semicolons. Blank means off.
extra_plan_paths =

[export]
default_timezone = America/New_York
min_archive_artifact_bytes = 1024
include_tool_summaries = true
# false skips existing files; true allows replacing existing exports.
overwrite_existing = false
# true previews the run without writing, renaming, deleting, or indexing.
dry_run = false
# true limits selected sources to one item per source/type where supported.
test_mode = false
sample_limit = 0
# Use either lookback_days or exact modified_after/modified_before dates.
lookback_days =
modified_after =
modified_before =
# Keep cleanup off unless you intentionally want to prune old archive files.
cleanup_small_artifacts = false
cleanup_legacy_plan_artifacts = false
cleanup_duplicate_artifacts = false
# Repair Cursor placeholder exports after Cursor DB export.
repair_cursor_placeholders = true
# Keep true for bounded test exports. Set false for old ChatMain --test plan behavior.
sample_plan_artifacts = true
# Keep false to avoid replacing copied/extracted plan archive files in the portable template.
overwrite_plan_artifacts = false
overwrite_copilot_cli_artifacts = false

[filter]
import_file = ./archive/claude/chats/example.md
roles = Assistant, User, Claude
exclude_roles =
date_time_after =
date_time_before =
characters_min = 150
message_lines_min = 2
deduplicate_messages = true
exclude_tool_messages = true
output_mode = filtered_only
write_split_files = false
# false creates numbered outputs instead of replacing existing filtered files.
overwrite_existing = false

[search]
folders = ./archive
# File extensions that searchMD.py should scan.
filetypes = .md, .py
match_any =
match_all =
recursive = true
min_size_bytes = 2048
lookback_days = 1000
modified_after =
modified_before =
exclude_dirs = .git, .hg, .svn, .venv, venv, env, .env, __pycache__, .mypy_cache, .pytest_cache, .ruff_cache, .tox, .cache, node_modules, site-packages, dist, build, .next, .vite, coverage, htmlcov, playwright-report, test-results, screenshots, backups, backup
sort_by = count_high
require_some_match = true

[titles]
prefer_local = true
env_file = ./.env
test_file = ./testfile.md
ollama_url = http://localhost:11434
ollama_model = qwen2.5:0.5b
google_model = gemini-2.5-flash
glm_model = GLM-4.6
max_input_chars = 20000
request_delay_sec = 1.5
max_retries = 3
