[paths]
# ChatMain legacy-parity template. Copy this file to config.ini to run like the
# original C:\Users\<you>\hello\Chats\ChatMain scripts, without hardcoding a user name.
archive_root = %USER%/hello/Chats/ChatMain/archive
index_path =
filter_output_dir = %USER%/hello/Chats/ChatMain/filtered
search_output = %USER%/hello/Resources/FileManagement/searchOutput/search.csv
vscode_output =
cursor_output =
claude_output =
codex_output =

[sources]
vscode_workspace_storage = %APPDATA%/Code/User/workspaceStorage
cursor_workspace_storage = %APPDATA%/Cursor/User/workspaceStorage
cursor_db = %APPDATA%/Cursor/User/globalStorage/state.vscdb
claude_projects = %USER%/.claude/projects
claude_plans = %USER%/.claude/plans
claude_plan_mirror = %USER%/hello/github/plan_docs/claude
codex_sessions = %USER%/.codex/sessions
copilot_cli_state = %USER%/.copilot/session-state
extra_plan_paths = %USER%/hello/github/nia/WireFrameGoogleNIAMerged/docs; %USER%/hello/github/nia/WireFrameGoogleNIAMerged/chat; %USER%/hello/github/nia/docs

[export]
default_timezone = America/New_York
min_archive_artifact_bytes = 1024
include_tool_summaries = true
overwrite_existing = false
dry_run = false
test_mode = false
sample_limit = 0
lookback_days =
modified_after =
modified_before =
cleanup_small_artifacts = true
cleanup_legacy_plan_artifacts = true
cleanup_duplicate_artifacts = true
repair_cursor_placeholders = true
sample_plan_artifacts = false
overwrite_plan_artifacts = true
overwrite_copilot_cli_artifacts = true

[filter]
import_file = %USER%/hello/Chats/ChatMain/archive/claude/chats/Analyze codebase bottlenecks and architectural complexity.md
roles = Assistant, User, Claude
exclude_roles =
date_time_after = 2026-05-25
date_time_before =
characters_min = 150
message_lines_min = 2
deduplicate_messages = true
exclude_tool_messages = true
output_mode = filtered_only
write_split_files = false
overwrite_existing = true

[search]
folders = %USER%/hello
filetypes = .py
match_any = deidentify, de-identify
match_all = deidentify
recursive = true
min_size_bytes = 2048
lookback_days = 1000
modified_after =
modified_before =
exclude_dirs = .git, .hg, .svn, .venv, venv, env, .env, __pycache__, .mypy_cache, .pytest_cache, .ruff_cache, .tox, .cache, node_modules, site-packages, dist, build, .next, .vite, coverage, htmlcov, playwright-report, test-results, screenshots, backups, backup
sort_by = count_high
require_some_match = true

[titles]
prefer_local = true
env_file = %USER%/hello/Chats/ChatMain/.env
test_file = ./testfile.md
ollama_url = http://localhost:11434
ollama_model = qwen2.5:0.5b
google_model = gemini-2.5-flash
glm_model = GLM-4.6
max_input_chars = 20000
request_delay_sec = 1.5
max_retries = 3
